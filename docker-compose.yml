# ==========================================
#  AI Background Remover — 一键部署
#  启动：docker compose up -d
#  访问：http://localhost:3000
# ==========================================

services:
  # ── 后端（FastAPI + rembg AI 推理） ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: bgremover-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # 持久化 rembg 模型缓存（避免容器重建后重新下载）
      - rembg-models:/root/.u2net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    # 内存限制（rembg 推理需 2-4GB，设为 4GB 安全值）
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 1g

  # ── 前端（Nginx 静态服务 + API 代理） ──
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bgremover-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  rembg-models:
    driver: local
